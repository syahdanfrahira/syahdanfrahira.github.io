<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --text-primary: #ffffff;
      --text-secondary: #b8c2cc;
      --accent-primary: #00e1d3;
      --accent-secondary: #ff7e5f;
      --tile-bg: rgba(255, 255, 255, 0.08);
      --win-bg: rgba(0, 225, 211, 0.2);
      --shadow-dark: 0 10px 20px rgba(0,0,0,0.3);
      --shadow-light: 0 5px 15px rgba(255,255,255,0.05);
      --border-radius: 16px;
      --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    [data-theme="light"] {
      --bg-primary: #f8f9fa;
      --bg-secondary: #e9ecef;
      --text-primary: #212529;
      --text-secondary: #495057;
      --tile-bg: rgba(255, 255, 255, 0.9);
      --win-bg: rgba(40, 167, 69, 0.2);
    }

    * { 
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      transition: var(--transition);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      color: var(--text-primary);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=3000&auto=format&fit=crop') center/cover no-repeat;
      opacity: 0.05;
      z-index: -1;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 2rem;
      text-align: center;
    }

    /* Loading Screen Premium */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease;
    }

    .loader {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      position: relative;
      margin-bottom: 2rem;
    }

    .loader::before,
    .loader::after {
      content: '';
      position: absolute;
      border-radius: 50%;
    }

    .loader::before {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, transparent 0%, var(--accent-primary) 50%, transparent 100%);
      animation: spin 1.5s linear infinite;
    }

    .loader::after {
      width: 80%;
      height: 80%;
      background: var(--bg-primary);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .loading-text {
      font-size: 1.2rem;
      color: var(--text-primary);
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    .loading-subtext {
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-weight: 300;
    }

    /* Header */
    .header {
      margin-bottom: 2rem;
      position: relative;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      position: relative;
      display: inline-block;
    }

    h1::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 3px;
      background: var(--accent-primary);
      border-radius: 3px;
    }

    /* Game Board */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin: 2rem auto;
    }

    .cell {
      aspect-ratio: 1/1;
      background: var(--tile-bg);
      border-radius: var(--border-radius);
      font-size: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--shadow-dark);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .cell:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.4);
    }

    .cell.win {
      background-color: var(--win-bg);
      animation: pulse 0.8s infinite alternate;
      position: relative;
      overflow: hidden;
    }

    .cell.win::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0,225,211,0.3) 0%, transparent 70%);
      animation: rotate 10s linear infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      100% { transform: scale(1.05); }
    }

    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Kontrol Game */
    .top-controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    select, button {
      padding: 0.8rem 1.5rem;
      border-radius: 50px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    select {
      background: rgba(255,255,255,0.1);
      color: var(--text-primary);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .info-btn {
      background: linear-gradient(135deg, var(--accent-secondary) 0%, #ff5e7d 100%);
      color: white;
      box-shadow: 0 5px 15px rgba(255, 126, 95, 0.4);
    }

    .info-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(255, 126, 95, 0.6);
    }

    .reset-btn {
      background: linear-gradient(135deg, var(--accent-primary) 0%, #00b4a9 100%);
      color: #111;
      box-shadow: 0 5px 15px rgba(0, 225, 211, 0.4);
    }

    .reset-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 225, 211, 0.6);
    }

    /* Info Pemain */
    .player-turn {
      margin: 1.5rem 0;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--accent-primary);
      position: relative;
      display: inline-block;
    }

    .player-turn::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--accent-primary);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    .player-turn.active::after {
      transform: scaleX(1);
    }

    /* Scoreboard */
    .scoreboard {
      display: flex;
      justify-content: space-around;
      margin: 2rem 0;
      background: rgba(255,255,255,0.05);
      padding: 1rem;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow-light);
    }

    .score-item {
      text-align: center;
    }

    .score-label {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .score-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-primary);
    }

    /* Kontrol Tema & Jam */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(5px);
      border: none;
      cursor: pointer;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
      box-shadow: var(--shadow-dark);
      z-index: 100;
    }

    .clock {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 1rem;
      font-weight: 600;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(5px);
      padding: 0.8rem 1.2rem;
      border-radius: 50px;
      box-shadow: var(--shadow-light);
    }

    /* Animasi */
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsif */
    @media (max-width: 600px) {
      .container {
        padding: 1.5rem;
      }
      
      h1 {
        font-size: 2rem;
      }
      
      .cell {
        font-size: 2.5rem;
      }
      
      .top-controls {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loader"></div>
    <div class="loading-text">Memuat Pengalaman Premium</div>
    <div class="loading-subtext">Harap tunggu sebentar...</div>
  </div>

  <div class="clock" id="clock">00:00:00</div>
  <button class="theme-toggle" onclick="toggleTheme()">🌙</button>

  <div class="container" id="gameContainer" style="display:none">
    <div class="header">
      <h1>Tic Tac Toe Premium</h1>
    </div>

    <div class="top-controls">
      <select id="difficulty">
        <option value="easy">Mudah</option>
        <option value="medium">Menengah</option>
        <option value="hard">Sulit</option>
      </select>
      <button class="info-btn" onclick="showHowToPlay()">
        <i class="fas fa-info-circle"></i> Panduan
      </button>
    </div>

    <div class="player-turn" id="turnInfo">Giliran Kamu</div>
    
    <div class="board" id="board"></div>
    
    <div class="scoreboard">
      <div class="score-item">
        <div class="score-label">Menang</div>
        <div class="score-value" id="wins">0</div>
      </div>
      <div class="score-item">
        <div class="score-label">Kalah</div>
        <div class="score-value" id="losses">0</div>
      </div>
      <div class="score-item">
        <div class="score-label">Seri</div>
        <div class="score-value" id="draws">0</div>
      </div>
    </div>

    <button class="reset-btn" onclick="resetGame()">
      <i class="fas fa-sync-alt"></i> Mulai Ulang
    </button>
  </div>

  <!-- Efek Suara -->
  <audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.mp3"></audio>
  <audio id="winSound" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>
  <audio id="loseSound" src="https://assets.mixkit.co/sfx/preview/mixkit-retro-arcade-lose-2027.mp3"></audio>
  <audio id="drawSound" src="https://assets.mixkit.co/sfx/preview/mixkit-neutral-interface-hover-3181.mp3"></audio>
  <audio id="hoverSound" src="https://assets.mixkit.co/sfx/preview/mixkit-quick-jump-arcade-game-239.mp3"></audio>

  <script>
    // Elemen DOM
    const boardEl = document.getElementById("board");
    const winsEl = document.getElementById("wins");
    const lossesEl = document.getElementById("losses");
    const drawsEl = document.getElementById("draws");
    const turnInfoEl = document.getElementById("turnInfo");
    const difficultyEl = document.getElementById("difficulty");
    
    // Efek suara
    const clickSound = document.getElementById("clickSound");
    const winSound = document.getElementById("winSound");
    const loseSound = document.getElementById("loseSound");
    const drawSound = document.getElementById("drawSound");
    const hoverSound = document.getElementById("hoverSound");

    // State game
    let board = ["", "", "", "", "", "", "", "", ""];
    let gameOver = false;
    let wins = 0, losses = 0, draws = 0;
    let isPlayerTurn = true;

    // Inisialisasi game
    function initGame() {
      renderBoard();
      updateTurnInfo();
      
      // Tambahkan efek hover ke semua sel
      document.querySelectorAll('.cell').forEach(cell => {
        cell.addEventListener('mouseenter', () => {
          if (!gameOver && isPlayerTurn && cell.textContent === "") {
            hoverSound.currentTime = 0;
            hoverSound.play().catch(e => console.log("Autoplay dicegah:", e));
          }
        });
      });
    }

    // Render papan permainan
    function renderBoard() {
      boardEl.innerHTML = "";
      board.forEach((cell, i) => {
        const div = document.createElement("div");
        div.className = "cell";
        div.textContent = cell;
        
        // Tambahkan ikon khusus untuk X dan O
        if (cell === "X") {
          div.innerHTML = '<i class="fas fa-times" style="color: var(--accent-primary);"></i>';
        } else if (cell === "O") {
          div.innerHTML = '<i class="fas fa-circle-notch" style="color: var(--accent-secondary);"></i>';
        }
        
        div.onclick = () => handleClick(i);
        boardEl.appendChild(div);
      });
    }

    // Handle klik pemain
    function handleClick(i) {
      if (board[i] || gameOver || !isPlayerTurn) return;
      
      board[i] = "X";
      clickSound.currentTime = 0;
      clickSound.play();
      renderBoard();
      
      const winner = checkWin();
      if (winner) return endGame(winner);
      if (board.every(cell => cell)) return endGame("draw");
      
      isPlayerTurn = false;
      updateTurnInfo();
      
      setTimeout(aiMove, 500);
    }

    // Gerakan AI
    function aiMove() {
      if (gameOver) return;
      
      const move = getAIMove();
      board[move] = "O";
      clickSound.currentTime = 0;
      clickSound.play();
      renderBoard();
      
      const winner = checkWin();
      if (winner) return endGame(winner);
      if (board.every(cell => cell)) return endGame("draw");
      
      isPlayerTurn = true;
      updateTurnInfo();
    }

    // Logika AI berdasarkan tingkat kesulitan
    function getAIMove() {
      const empty = board.map((val, i) => val === "" ? i : null).filter(i => i !== null);
      
      switch(difficultyEl.value) {
        case "easy":
          return empty[Math.floor(Math.random() * empty.length)];
          
        case "medium":
          // 50% chance untuk bergerak cerdas, 50% random
          return Math.random() > 0.5 ? blockOrRandom(empty) : empty[Math.floor(Math.random() * empty.length)];
          
        case "hard":
        default:
          return minimax(board, "O").index;
      }
    }

    // AI mencoba memblokir atau menang
    function blockOrRandom(empty) {
      // Coba menang
      for (let i of empty) {
        board[i] = "O";
        if (checkWin() === "O") {
          board[i] = "";
          return i;
        }
        board[i] = "";
      }
      
      // Coba blokir
      for (let i of empty) {
        board[i] = "X";
        if (checkWin() === "X") {
          board[i] = "";
          return i;
        }
        board[i] = "";
      }
      
      // Gerakan random
      return empty[Math.floor(Math.random() * empty.length)];
    }

    // Algoritma Minimax untuk AI sulit
    function minimax(newBoard, player) {
      const availSpots = newBoard.map((val, i) => val === "" ? i : null).filter(i => i !== null);
      
      if (checkWin(newBoard) === "X") return { score: -10 };
      if (checkWin(newBoard) === "O") return { score: 10 };
      if (availSpots.length === 0) return { score: 0 };
      
      const moves = [];
      for (let i of availSpots) {
        const move = { index: i };
        newBoard[i] = player;
        
        const result = minimax(newBoard, player === "O" ? "X" : "O");
        move.score = result.score;
        
        newBoard[i] = "";
        moves.push(move);
      }
      
      return player === "O"
        ? moves.reduce((best, m) => m.score > best.score ? m : best)
        : moves.reduce((best, m) => m.score < best.score ? m : best);
    }

    // Cek pemenang
    function checkWin(customBoard = board) {
      const wins = [
        [0,1,2],[3,4,5],[6,7,8], // baris
        [0,3,6],[1,4,7],[2,5,8], // kolom
        [0,4,8],[2,4,6] // diagonal
      ];
      
      for (let combo of wins) {
        const [a,b,c] = combo;
        if (customBoard[a] && customBoard[a] === customBoard[b] && customBoard[a] === customBoard[c]) {
          if (customBoard === board) {
            // Tambahkan efek kemenangan
            document.querySelectorAll('.cell')[a].classList.add("win");
            document.querySelectorAll('.cell')[b].classList.add("win");
            document.querySelectorAll('.cell')[c].classList.add("win");
          }
          return customBoard[a];
        }
      }
      return null;
    }

    // Akhiri permainan
    function endGame(winner) {
      gameOver = true;
      
      if (winner === "draw") {
        draws++;
        drawsEl.textContent = draws;
        drawSound.currentTime = 0;
        drawSound.play();
        
        Swal.fire({
          title: 'Seri!',
          text: 'Permainan berakhir imbang',
          icon: 'info',
          confirmButtonText: 'Main Lagi'
        }).then(() => resetGame());
        
      } else if (winner === "X") {
        wins++;
        winsEl.textContent = wins;
        winSound.currentTime = 0;
        winSound.play();
        
        Swal.fire({
          title: 'Kamu Menang!',
          text: 'Selamat! Kamu mengalahkan AI',
          icon: 'success',
          confirmButtonText: 'Lanjutkan'
        }).then(() => resetGame());
        
      } else {
        losses++;
        lossesEl.textContent = losses;
        loseSound.currentTime = 0;
        loseSound.play();
        
        Swal.fire({
          title: 'Kamu Kalah!',
          text: 'AI lebih pintar kali ini. Coba lagi!',
          icon: 'error',
          confirmButtonText: 'Coba Lagi'
        }).then(() => resetGame());
      }
    }

    // Reset permainan
    function resetGame() {
      board = ["", "", "", "", "", "", "", "", ""];
      gameOver = false;
      isPlayerTurn = true;
      renderBoard();
      updateTurnInfo();
    }

    // Update info giliran
    function updateTurnInfo() {
      if (gameOver) {
        turnInfoEl.textContent = "Permainan Selesai";
        turnInfoEl.classList.remove("active");
      } else {
        turnInfoEl.textContent = isPlayerTurn ? "Giliran Kamu" : "Giliran AI";
        turnInfoEl.classList.toggle("active", isPlayerTurn);
      }
    }

    // Toggle tema gelap/terang
    function toggleTheme() {
      const theme = document.body.getAttribute("data-theme") === "light" ? "" : "light";
      document.body.setAttribute("data-theme", theme);
      document.querySelector('.theme-toggle').innerHTML = theme === 'light' ? '🌙' : '☀️';
    }

    // Update jam
    function updateClock() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      const s = now.getSeconds().toString().padStart(2, '0');
      document.getElementById("clock").textContent = `${h}:${m}:${s}`;
    }

    // Tampilkan panduan bermain
    function showHowToPlay() {
      clickSound.currentTime = 0;
      clickSound.play();
      
      Swal.fire({
        title: 'Cara Bermain',
        html: `
          <div style="text-align: left; line-height: 1.6;">
            <p><b>Tujuan:</b> Susun 3 simbol berurutan (horizontal, vertikal, atau diagonal)</p>
            <p><b>Kamu:</b> Gunakan simbol <i class="fas fa-times" style="color: var(--accent-primary);"></i> (X)</p>
            <p><b>AI:</b> Menggunakan simbol <i class="fas fa-circle-notch" style="color: var(--accent-secondary);"></i> (O)</p>
            <hr style="margin: 1rem 0; border-color: rgba(255,255,255,0.1);">
            <p><b>Tingkat Kesulitan:</b></p>
            <ul style="margin-left: 1.5rem;">
              <li><b>Mudah:</b> AI bergerak acak</li>
              <li><b>Menengah:</b> AI mencoba blokir/menang</li>
              <li><b>Sulit:</b> AI hampir tak terkalahkan</li>
            </ul>
          </div>
        `,
        icon: 'info',
        confirmButtonText: 'Mengerti',
        background: 'var(--bg-secondary)',
        color: 'var(--text-primary)'
      });
    }

    // Inisialisasi saat halaman dimuat
    window.onload = () => {
      // Set tema berdasarkan waktu
      const hour = new Date().getHours();
      if (hour >= 18 || hour <= 6) {
        document.body.setAttribute("data-theme", "");
      } else {
        document.body.setAttribute("data-theme", "light");
        document.querySelector('.theme-toggle').innerHTML = '🌙';
      }
      
      // Tampilkan loading screen
      setTimeout(() => {
        document.getElementById("loading").style.opacity = "0";
        
        setTimeout(() => {
          document.getElementById("loading").style.display = "none";
          document.getElementById("gameContainer").style.display = "block";
          
          // Tampilkan welcome message
          Swal.fire({
            title: 'Selamat Datang!',
            text: 'Bersiaplah bermain Tic Tac Toe Premium melawan AI!',
            icon: 'success',
            confirmButtonText: 'Mulai Bermain',
            background: 'var(--bg-secondary)',
            color: 'var(--text-primary)'
          }).then(() => {
            // Inisialisasi game setelah welcome message ditutup
            initGame();
          });
        }, 800);
      }, 1500);
      
      // Mulai jam
      setInterval(updateClock, 1000);
      updateClock();
    };
  </script>
</body>
</html>
